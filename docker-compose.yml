services:
  mysql:
    image: mysql:latest
    container_name: mysql-toyproject
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: toyproject
      MYSQL_USER: jayho
      MYSQL_PASSWORD: jayho1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: toyproject-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/toyproject?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: jayho
      SPRING_DATASOURCE_PASSWORD: jayho1234

volumes:
  mysql-data:
